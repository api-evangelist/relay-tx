aid: relay-tx
name: Relay Therapeutics
description: >-
  Relay Therapeutics is a Cambridge, Massachusetts clinical-stage precision
  medicines company (NASDAQ: RLAY) using protein motion to drug historically
  intractable oncology and genetic-disease targets. Its Dynamo platform
  combines full-length protein engineering, cryo-EM, ambient-temperature
  X-ray crystallography, long-timescale molecular dynamics, machine learning,
  virtual screening, activity- and ligand-based screening, and an ML-powered
  DNA-encoded library (REL-DEL) to design molecules against conformational
  states that static structures miss. The clinical pipeline is led by
  zovegalisib (RLY-2608), described as the first allosteric, pan-mutant,
  isoform-selective PI3K-alpha inhibitor, in Phase 3 for HR+/HER2- breast
  cancer and Phase 1/2 for vascular anomalies and PROS; RLY-8161, an NRAS-
  selective inhibitor, is in Phase 1/2 for NRAS-mutant solid tumors; an
  alpha-galactosidase A non-inhibitory chaperone for Fabry disease is in
  discovery; lirafugratinib (RLY-4008, FGFR2) was out-licensed to Elevar
  Therapeutics in December 2024. Relay has no public developer API, SDK, or
  open-source release; the Dynamo platform is proprietary internal R&D
  tooling, and the company's GitHub organization currently has no public
  repositories. The commercial surface is therapeutic candidates, clinical
  partnerships, and out-licensing rather than data products.
